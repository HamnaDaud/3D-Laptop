<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XI Pulse | 3D Laptop Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Banner -->
    <header class="banner">
        <div class="banner-left">
            <img src="assets/xi-pulse-logo.png" alt="XI Pulse Logo" class="logo">
            <div class="banner-text">
                <h1>XI PULSE</h1>
                <span>3D Product Viewer</span>
            </div>
        </div>
        <button id="modeToggle" class="mode-toggle" aria-label="Toggle dark mode">
            <span id="modeIcon">🌙</span>
        </button>
    </header>

    <!-- Floating particles -->
    <div id="particles" class="particles"></div>

    <!-- Hotspot markers, positioned over the 3D model -->
    <div id="hotspots"></div>

    <!-- Interactive Description / Spec Card -->
    <section class="description-card" id="descCard">
        <div class="desc-header">
            <span class="pulse-dot"></span>
            <h2 id="descTitle">ASUS ROG Laptop</h2>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab-btn active" data-tab="overview">🖥️ Overview</button>
            <button class="tab-btn" data-tab="display">🎨 Display</button>
            <button class="tab-btn" data-tab="performance">⚡ Performance</button>
            <button class="tab-btn" data-tab="design">🔌 Design</button>
        </div>

        <p id="descText">
            A sleek matte-black powerhouse built for performance and style.
            Click a glowing marker on the laptop, or a tab above, to explore
            its features.
        </p>

        <div class="tags" id="descTags">
            <span class="tag">Matte Black</span>
            <span class="tag">Aluminum Body</span>
            <span class="tag">RGB Keyboard</span>
        </div>
    </section>

    <div class="hint">🖱️ Drag to rotate · Scroll to zoom · Click a marker to explore</div>

    <script type="module" src="script.js"></script>
</body>
</html>
